<app-navbar></app-navbar>
<div class="container">
  <div class="row mb-3"></div>
  <div *ngIf="!isLoading() && employee(); else loading" class="w-100">
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp No</label>
      <div class="col-sm-10">
        <input
          type="text"
          class="form-control readonly"
          id="colFormLabel"
          placeholder="Emp No"
          [value]="employee()!.empNo"
          readonly
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp Name</label>
      <div class="col-sm-10">
        <input
          type="text"
          class="form-control"
          id="colFormLabel"
          placeholder="Emp Name"
          [value]="employee()!.empName"
          (input)="employee()!.empName = $any($event.target).value"
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp Email</label>
      <div class="col-sm-10">
        <input
          type="email"
          class="form-control"
          id="colFormLabel"
          placeholder="Emp Email"
          [value]="employee()!.empEmail"
          (input)="employee()!.empEmail = $any($event.target).value"
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp Mobile</label>
      <div class="col-sm-10">
        <input
          type="text"
          class="form-control"
          id="colFormLabel"
          placeholder="Emp Mobile"
          [value]="employee()!.empMobile"
          (input)="employee()!.empMobile = $any($event.target).value"
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp Salary</label>
      <div class="col-sm-10">
        <input
          type="number"
          class="form-control"
          id="colFormLabel"
          placeholder="Emp Salary"
          [value]="employee()!.salary"
          (input)="employee()!.salary = $any($event.target).valueAsNumber"
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp Location</label>
      <div class="col-sm-10">
        <input
          type="text"
          class="form-control"
          id="colFormLabel"
          placeholder="Emp Location"
          [value]="employee()!.location"
          (input)="employee()!.location = $any($event.target).value"
        />
      </div>
    </div>
    <div class="row d-flex justify-content-center">
      <div class="col-1">
        <button type="button" (click)="updateEmployee()" class="btn btn-success">Update</button>
      </div>
      <div class="col-1">
        <a type="button" class="btn btn-secondary" href="/">Back</a>
      </div>
    </div>
  </div>
  <ng-template #loading>
    <div class="alert alert-info" role="alert">Loading employee details...</div>
  </ng-template>
</div>
