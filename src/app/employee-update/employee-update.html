<app-navbar></app-navbar>
<div class="container">
  <div class="row mb-3"></div>
  <div *ngIf="employee$ | async as employee; else loading" class="w-100">
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp No</label>
      <div class="col-sm-10">
        <input
          type="text"
          class="form-control readonly"
          id="colFormLabel"
          s
          placeholder="Emp No"
          [value]="employee.empNo"
          readonly
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp Name</label>
      <div class="col-sm-10">
        <input
          type="text"
          class="form-control"
          id="colFormLabel"
          placeholder="Emp Name"
          [value]="employee.empName"
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp Email</label>
      <div class="col-sm-10">
        <input
          type="email"
          class="form-control"
          id="colFormLabel"
          placeholder="Emp Email"
          [value]="employee.empEmail"
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp Mobile</label>
      <div class="col-sm-10">
        <input
          type="text"
          class="form-control"
          id="colFormLabel"
          placeholder="Emp Mobile"
          [value]="employee.empMobile"
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp Salary</label>
      <div class="col-sm-10">
        <input
          type="number"
          class="form-control"
          id="colFormLabel"
          placeholder="Emp Salary"
          [value]="employee.salary"
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="colFormLabel" class="col-sm-2 col-form-label">Emp Location</label>
      <div class="col-sm-10">
        <input
          type="text"
          class="form-control"
          id="colFormLabel"
          placeholder="Emp Location"
          [value]="employee.location"
        />
      </div>
    </div>
    <div class="d-flex justify-content-center">
      <button type="button" class="btn btn-success">Update</button>
    </div>
  </div>
  <ng-template #loading>
    <div class="alert alert-info" role="alert">Loading employee details...</div>
  </ng-template>
</div>
